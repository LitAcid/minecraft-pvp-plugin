<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PVP Core | Best Minecraft PvP Plugin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="All-in-one Minecraft PvP plugin with duels, FFA, queue system, kits and arenas.">

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* PARTICLE BG */
#particles {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* NAVBAR */
.navbar {
  position:fixed;
  top:0;
  width:100%;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  backdrop-filter: blur(12px);
  background:rgba(0,0,0,0.5);
  z-index:1000;
}

.btn {
  background: linear-gradient(45deg,#22c55e,#16a34a);
  padding:10px 20px;
  border-radius:10px;
  color:white;
  text-decoration:none;
  font-weight:bold;
  position:relative;
  box-shadow:0 0 15px rgba(0,255,100,0.5);
}

.badge {
  position:absolute;
  top:-8px;
  right:-10px;
  background:red;
  padding:3px 6px;
  font-size:10px;
  border-radius:6px;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding-top:80px;
}

.hero img {
  width:70%;
  max-width:700px;
  border-radius:12px;
  box-shadow:0 0 60px rgba(0,255,150,0.4);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% {transform:translateY(0);}
  50% {transform:translateY(-12px);}
  100% {transform:translateY(0);}
}

.hero h1 {
  font-size:50px;
  margin-top:20px;
}

.hero p {
  max-width:600px;
  opacity:0.85;
}

/* GLASS CARDS */
.section {
  padding:80px 20px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:12px;
  padding:20px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px);
  box-shadow:0 0 20px rgba(0,255,150,0.2);
}

/* COUNTERS */
.counter {
  font-size:35px;
  margin:10px;
}

/* CTA */
.cta {
  padding:60px;
}

/* FADE */
.fade {
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.fade.show {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="navbar">
  <div>PVP Core</div>
  <a href="https://pariah3.gumroad.com/l/zuadnl" class="btn">
    Buy Now
    <span class="badge">$2</span>
  </a>
</div>

<section class="hero fade">
  <img src="https://raw.githubusercontent.com/LitAcid/minecraft-pvp-plugin/main/thumbnail-pvpcore.png">
  <h1>Stop Using 5 Plugins.</h1>
  <p>Duels, FFA, Queue, Kits & Arenas — Everything in ONE system.</p>
</section>

<section class="section fade">
  <h2>⚔ Features</h2>
  <div class="grid">
    <div class="card">⚔️ Duel System</div>
    <div class="card">🎯 FFA Modes</div>
    <div class="card">🧠 Queue GUI</div>
    <div class="card">🛠 Kit Editor</div>
    <div class="card">🔁 Arena Regen</div>
    <div class="card">📊 Stats</div>
    <div class="card">🧭 /guide Setup</div>
    <div class="card">⚡ Optimized</div>
  </div>
</section>

<section class="section fade">
  <h2>📊 Live Stats</h2>
  <div>
    <span class="counter" id="users">0</span> Users |
    <span class="counter" id="servers">0</span> Servers |
    <span class="counter" id="uptime">0</span>% Stable
  </div>
</section>

<section class="cta fade">
  <h2>Get PVP Core Now</h2>
  <a href="https://pariah3.gumroad.com/l/zuadnl" class="btn">Buy for $2</a>
</section>

<script>
// SCROLL ANIMATION
const els=document.querySelectorAll('.fade');
function reveal(){
  els.forEach(e=>{
    if(e.getBoundingClientRect().top < window.innerHeight-100){
      e.classList.add('show');
    }
  });
}
window.addEventListener('scroll',reveal);
reveal();

// COUNTER ANIMATION
function animate(id, target){
  let el=document.getElementById(id);
  let count=0;
  let step=target/50;
  let interval=setInterval(()=>{
    count+=step;
    if(count>=target){count=target; clearInterval(interval);}
    el.innerText=Math.floor(count);
  },20);
}
animate("users", 500);
animate("servers", 120);
animate("uptime", 99);

// PARTICLES
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:Math.random()-0.5,
    dy:Math.random()-0.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(0,255,150,0.5)";
    ctx.fill();
    p.x+=p.dx;
    p.y+=p.dy;
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
